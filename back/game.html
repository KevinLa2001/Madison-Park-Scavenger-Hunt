<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madison Park Scavenger Hunt Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Madison Park Scavenger Hunt</h1>
        <p>Explore Madison Park's history! Visit each location, check in, and unlock the next clue.</p>
    </header>
    <main id="game">
        <div id="locations"></div>
        <div id="distance-indicator-container" style="display:none;margin:1em 0;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:0.5em;">
                <canvas id="crosshairs-canvas" width="200" height="200" style="border:1px solid #888;background:#fafdff;"></canvas>
                <span id="distance-indicator-label" style="min-width:120px;display:inline-block;"></span>
                <span id="gps-coords" style="font-size:0.98em;color:#555;"></span>
            </div>
        </div>
    </main>
    <script src="game.js"></script>
</body>
</html>
