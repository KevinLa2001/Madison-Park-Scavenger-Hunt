<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Queenie the Elephant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;">
        <h1>Queenie the Elephant</h1>
        <img src="img/queenie.png" alt="Queenie the Elephant" style="max-width:350px;width:90vw;border-radius:12px;box-shadow:0 2px 12px #888;margin:1.5em 0;">
        <div id="queenie-text" style="font-size:1.2em;max-width:600px;text-align:center;margin-bottom:2em;"></div>
        <div style="font-size:1.3em;font-weight:bold;color:#217dbb;margin-top:2em;">You won! Show this photo to the Friends of Madison Park table at the farmer's market for a prize.</div>
    </main>
    <script>
    document.getElementById('queenie-text').innerHTML = `Queenie was a working Asian elephant who performed as part of the traveling animal attractions brought into Seattle’s White City amusement park in 1909. Normally steady and obedient under her primary trainer, Bernard Dooley, she was a familiar feature of the park’s menagerie—used for demonstrations, light labor, and drawing crowds to the new Madison Park attraction. Her brief moment of fame came on May 28, 1909, when two small white dogs startled her during a routine move, triggering the chaotic chase that became one of the most memorable episodes in early Madison Park history. <br><br><a href="https://pauldorpat.com/2011/08/13/seattle-madison-park-elephant-escape/" target="_blank" rel="noopener">Read more about Queenie’s escape</a>.`;
    </script>
</body>
</html>
