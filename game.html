<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madison Park Scavenger Hunt Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Madison Park Scavenger Hunt</h1>
        <p>Explore Madison Park's history! Visit each location, check in, and unlock the next clue.</p>
    </header>
    <main id="game">
        <div id="locations"></div>
        <div id="distance-indicator-container" style="display:none;margin:1em 0;">
            <label for="distance-indicator" style="font-weight:bold;">Distance to target:</label>
            <div style="display:flex;align-items:center;gap:1em;">
                <progress id="distance-indicator" value="0" max="100" style="width:300px;height:24px;"></progress>
                <span id="distance-indicator-label" style="min-width:120px;display:inline-block;"></span>
            </div>
        </div>
    </main>
    <script src="game.js"></script>
</body>
</html>
